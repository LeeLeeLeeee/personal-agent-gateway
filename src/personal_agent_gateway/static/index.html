<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Personal Agent Gateway</title>
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body>
    <main id="app-root" class="app-shell">
      <header class="app-header">
        <div>
          <h1>Personal Agent Gateway</h1>
          <p id="connection-state">Checking session</p>
          <p id="session-meta" class="session-meta">Session pending</p>
        </div>
        <button id="reset-button" class="secondary" type="button">Reset</button>
      </header>

      <div id="error-banner" class="error-banner" role="alert" hidden></div>

      <section id="token-panel" class="token-panel" aria-labelledby="token-title" hidden>
        <h2 id="token-title">Token required</h2>
        <form id="token-form" class="token-form">
          <label for="token-input">Web token</label>
          <div class="token-row">
            <input id="token-input" name="token" type="password" autocomplete="current-password">
            <button type="submit">Connect</button>
          </div>
        </form>
      </section>

      <section id="otp-setup-panel" class="otp-setup-panel" aria-labelledby="otp-setup-title" hidden>
        <div class="otp-setup-header">
          <div>
            <h2 id="otp-setup-title">OTP setup</h2>
            <p id="otp-setup-state" class="otp-setup-state">Not configured</p>
          </div>
          <button id="otp-start-button" type="button">Start setup</button>
        </div>
        <div id="otp-setup-body" class="otp-setup-body" hidden>
          <div id="otp-qr" class="otp-qr" aria-label="OTP QR code"></div>
          <div class="otp-secret-block">
            <label for="otp-secret">Manual secret</label>
            <code id="otp-secret"></code>
            <form id="otp-verify-form" class="otp-verify-form">
              <label for="otp-code-input">Verification code</label>
              <div class="otp-verify-row">
                <input
                  id="otp-code-input"
                  name="otp"
                  type="text"
                  inputmode="numeric"
                  autocomplete="one-time-code"
                  maxlength="6"
                >
                <button type="submit">Verify</button>
              </div>
            </form>
          </div>
        </div>
        <div id="otp-recovery-panel" class="otp-recovery-panel" hidden>
          <h3>Recovery codes</h3>
          <ol id="otp-recovery-codes"></ol>
        </div>
      </section>

      <section class="workspace-layout" aria-label="Agent workspace">
        <aside class="session-panel" aria-labelledby="sessions-title">
          <div class="session-panel-header">
            <h2 id="sessions-title">Sessions</h2>
          </div>
          <form id="session-search-form" class="session-search-form">
            <label for="session-search">Search sessions</label>
            <div class="session-search-row">
              <input id="session-search" name="q" type="search" autocomplete="off">
              <button class="secondary" type="submit">Search</button>
            </div>
          </form>
          <ol id="session-list" class="session-list" aria-live="polite"></ol>
        </aside>

        <section class="workspace" aria-label="Active session">
          <ol id="message-list" class="message-list" aria-live="polite"></ol>

          <section id="approval-panel" class="approval-panel" aria-labelledby="approval-title" hidden>
            <div class="approval-copy">
              <h2 id="approval-title">Shell approval pending</h2>
              <pre id="approval-command"></pre>
            </div>
            <div class="approval-actions">
              <button id="approve-button" type="button">Approve</button>
              <button id="deny-button" class="secondary" type="button">Deny</button>
            </div>
          </section>

          <form id="chat-form" class="composer">
            <label for="message-input">Message</label>
            <textarea id="message-input" name="message" rows="3" autocomplete="off"></textarea>
            <button id="send-button" type="submit">Send</button>
          </form>
        </section>
      </section>
    </main>
    <script src="/static/app.js"></script>
  </body>
</html>
